name: Daily HN Digest

on:
  schedule:
    # 00:17 UTC = 08:17 北京时间。GitHub cron 用 UTC，改时间就改这里（北京 − 8 = UTC）。
    - cron: "17 0 * * *"
  workflow_dispatch:        # 允许在 Actions 页面手动点一次（首次部署 / 调试用）
    inputs:
      num:
        description: "摘要的故事数"
        default: "10"

permissions:
  contents: write           # 把当天 digest + 缓存提交回仓库（存档 + 省钱）
  pages: write              # 部署到 GitHub Pages
  id-token: write           # Pages 部署需要

# 同一时间只跑一份部署，避免互相覆盖
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout (含历史存档与缓存)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate today's digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        # 定时触发没有 inputs，命中 '10'；手动触发用输入框的值（预填也是 10）。
        run: python hn_digest.py --num "${{ github.event.inputs.num || '10' }}"

      - name: Build public site + index
        run: python build_index.py --digests ./digests --out ./public

      - name: Commit archive back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "chore: HN digest $(date -u +%F)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
